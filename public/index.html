<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cha Chat — The Scribe of Middle-earth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="parchment-bg">
    <div class="container">
      <header>
        <div class="ornament">✦ ✦ ✦</div>
        <h1>The Scribe of Middle-earth</h1>
        <p class="subtitle">문장을 톨킨의 고풍스러운 문체로 변환합니다</p>
        <div class="ornament">✦ ✦ ✦</div>
      </header>

      <main>
        <div class="panel-grid">
          <section class="panel">
            <h2>원문 <span class="label-sub">(현대의 언어)</span></h2>
            <textarea
              id="inputText"
              placeholder="변환할 문장을 이곳에 입력하시오... (최대 2000자)"
              maxlength="2000"
            ></textarea>
            <div class="char-count"><span id="charCount">0</span> / 2000</div>
            <div class="lang-selector">
              <label class="lang-option">
                <input type="radio" name="lang" value="ko" checked />
                <span>한글</span>
              </label>
              <label class="lang-option">
                <input type="radio" name="lang" value="en" />
                <span>English</span>
              </label>
            </div>
            <button id="transformBtn" onclick="transformText()">
              <span class="btn-icon">⚔</span> 변환하기
            </button>
          </section>

          <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-symbol">☽</div>
            <div class="divider-line"></div>
          </div>

          <section class="panel">
            <h2>변환문 <span class="label-sub">(가운데 땅의 언어)</span></h2>
            <div id="outputArea" class="output-area">
              <p class="placeholder-text">변환된 문장이 이곳에 나타날 것이니...</p>
            </div>
            <button id="copyBtn" class="copy-btn" onclick="copyResult()" style="display:none;">
              <span class="btn-icon">📜</span> 복사하기
            </button>
          </section>
        </div>
      </main>

      <div id="loadingOverlay" class="loading-overlay" style="display:none;">
        <div class="loading-content">
          <div class="rune-spinner">☽ ✦ ☾</div>
          <p>필사 중이니 잠시 기다리시오...</p>
        </div>
      </div>

      <div id="errorMsg" class="error-msg" style="display:none;"></div>

      <div class="history-toggle-wrap">
        <button id="historyToggleBtn" onclick="toggleHistory()">📜 기록 보기</button>
      </div>

      <section id="historyPanel" class="history-panel" style="display:none;">
        <div class="history-panel-header">
          <span class="history-panel-title">최근 변환 기록</span>
          <button class="history-clear-btn" onclick="clearHistory()">전체 삭제</button>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>

      <footer>
        <p>Powered by Claude &amp; the wisdom of J.R.R. Tolkien</p>
      </footer>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
